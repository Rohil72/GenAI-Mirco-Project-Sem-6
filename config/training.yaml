model:
  name: "microsoft/Phi-3-mini-4k-instruct"
  local_path: "models/base"
  max_length: 384

lora:
  r: 16
  lora_alpha: 32
  target_modules: ["qkv_proj", "o_proj", "gate_up_proj", "down_proj"]
  lora_dropout: 0.05
  bias: "none"
  task_type: "CAUSAL_LM"

quantization:
  load_in_4bit: true
  bnb_4bit_compute_dtype: "float16"
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_use_double_quant: true

training:
  output_dir: "models/lora"
  num_train_epochs: 3                        # more epochs to compensate for tiny dataset
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-4
  warmup_ratio: 0.05
  lr_scheduler_type: "cosine"
  save_steps: 50                              # must be < steps_per_epoch (9 samples = 9 steps)
  logging_steps: 5
  eval_steps: 50
  fp16: true
  optim: "paged_adamw_8bit"
  dataloader_num_workers: 0
  dataset_text_field: "text"                  # matches the "text" key in your JSONL

data:
  raw_path: "data/raw/synthetic_logs.jsonl"
  train_path: "data/processed/train.jsonl"
  val_path: "data/processed/val.jsonl"
  val_split: 0.1
  num_days: 90
